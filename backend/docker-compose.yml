version: '3.8'

services:
  backend:
    build: .
    container_name: sims_backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - APP_ENV=development
      - DB_BACKEND=sqlite
      - SQLITE_PATH=/app/data/sims.db
    restart: unless-stopped
